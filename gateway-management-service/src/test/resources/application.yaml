spring:
  application:
    name: gateway-management-service
  datasource:
    url: jdbc:h2:mem:gateway-management-service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090
          jwk-set-uri: http://localhost:9090/oauth2/jwks

eureka:
  client:
    enabled: false

eureka-api:
  base-url: http://localhost:8761/eureka/v2

standard-gateway:
  base-url: http://standard-gateway
