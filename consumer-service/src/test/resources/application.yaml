spring:
  datasource:
    url: jdbc:h2:mem:consumer-service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

eureka:
  client:
    enabled: false

consumer:
  seed:
    gateway-id: ecommerce-gateway
    owner-user-uuid: demo-owner
    consumer-name: Demo Consumer
  security:
    basic:
      username: enduser
      password: enduser123
    api-key:
      header-name: X-API-Key
      value: stadoor-demo-key
    jwt:
      issuer: consumer-service
      secret: stadoor-jwt-demo-secret-key-that-is-at-least-32-bytes
      access-token-expiration-seconds: 900
      refresh-token-expiration-seconds: 604800
