spring:
  application:
    name: consumer-service
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
consumer:
  security:
    basic:
      username: enduser
      password: enduser123
    api-key:
      header-name: X-API-Key
      value: stadoor-demo-key
    jwt:
      issuer: consumer-service
      secret: stadoor-jwt-demo-secret-key-that-is-at-least-32-bytes
      access-token-expiration-seconds: 900
      refresh-token-expiration-seconds: 604800
