spring:
  application:
    name: consumer-service
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
consumer:
  security:
    basic:
      username: enduser
      password: enduser123
    api-key:
      header-name: X-API-Key
      value: stadoor-demo-key
