services:
  consul:
    image: hashicorp/consul:1.21
    container_name: dynamic-routes-consul
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"

  postgres:
    image: postgres:17.5-bullseye
    container_name: dynamic-routes-postgres
    environment:
      POSTGRES_DB: dynamic_routes_demo
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d dynamic_routes_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
