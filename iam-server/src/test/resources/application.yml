eureka:
  client:
    enabled: false

spring:
  application:
    name: iam-server
  datasource:
    url: jdbc:h2:mem:iam-server;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:9090

server:
  port: 9090
