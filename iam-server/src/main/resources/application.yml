eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}
    prefer-ip-address: true
spring:
  application:
    name: iam-server
  datasource:
    url: jdbc:postgresql://localhost:5434/iam_demo
    username: iam_user
    password: iam_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:9090
server:
  port: 9090


logging.level.org.springframework.security: DEBUG
#logging.level.org.springframework.security: TRACE
logging.level.org.springframework.security.oauth2.server.authorization: TRACE
logging.level.org.springframework.security.oauth2.server.authorization.oidc.authentication: TRACE
